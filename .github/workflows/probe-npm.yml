name: probe-npm-token

on:
  workflow_dispatch:

jobs:
  whoami:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"
      - name: whoami
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: list packages
        run: npm access ls-packages || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: token type
        run: npm token list || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
